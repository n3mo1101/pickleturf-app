{% extends 'accounts/base_auth.html' %}
{% load crispy_forms_tags allauth %}

{% block auth_title %}Create Your Account{% endblock %}

{% block auth_content %}
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="d-grid mt-3">
        <button class="btn btn-success btn-lg" type="submit">Register</button>
    </div>
</form>

<hr>
<p class="text-center text-muted small mb-2">Or sign up with</p>
<div class="d-flex gap-2 justify-content-center">
    <a href="{% provider_login_url 'google' %}" class="btn btn-outline-danger">
        <i class="bi bi-google"></i> Google
    </a>
    <a href="{% provider_login_url 'facebook' %}" class="btn btn-outline-primary">
        <i class="bi bi-facebook"></i> Facebook
    </a>
</div>

<p class="text-center mt-3 small">
    Already have an account? <a href="{% url 'account_login' %}">Login</a>
</p>
{% endblock %}
