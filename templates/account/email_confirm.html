{% extends 'accounts/base_auth.html' %}
{% block auth_title %}Confirm Your Email{% endblock %}
{% block auth_content %}
<div class="text-center">
    <i class="bi bi-envelope-check-fill text-success" style="font-size:3rem;"></i>
    <p class="mt-3">We've sent a confirmation link to <strong>{{ email }}</strong>.</p>
    <p class="text-muted small">Check your inbox (and spam folder).</p>
    <a href="{% url 'account_login' %}" class="btn btn-outline-secondary mt-2">Back to Login</a>
</div>
{% endblock %}
