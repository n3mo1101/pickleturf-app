{% extends 'accounts/base_auth.html' %}
{% block auth_title %}Email Sent{% endblock %}

    <i class="bi bi-envelope-paper-fill text-warning" style="font-size:3rem;"></i>
    <p class="mt-3">Password reset link sent. Check your inbox.</p>

</div>
{% endblock %}
