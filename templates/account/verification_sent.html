{% extends 'accounts/base_auth.html' %}
{% block auth_title %}Check Your Email{% endblock %}
{% block auth_content %}
<div class="text-center">
    <i class="bi bi-send-check-fill text-success" style="font-size:3rem;"></i>
    <p class="mt-3">A verification email has been sent. Please verify before logging in.</p>
    <a href="{% url 'account_login' %}" class="btn btn-success mt-2">Go to Login</a>
</div>
{% endblock %}
