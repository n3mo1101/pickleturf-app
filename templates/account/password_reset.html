{% extends 'accounts/base_auth.html' %}
{% load crispy_forms_tags %}
{% block auth_title %}Reset Password{% endblock %}
{% block auth_content %}
<p class="text-muted small">Enter your email and we'll send you a reset link.</p>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="d-grid mt-3">
        <button class="btn btn-warning btn-lg" type="submit">Send Reset Link</button>
    </div>
</form>
<p class="text-center mt-3 small">
    <a href="{% url 'account_login' %}">← Back to Login</a>
</p>
{% endblock %}
