{% extends 'accounts/base_auth.html' %}
{% load crispy_forms_tags %}
{% block auth_title %}Set New Password{% endblock %}
{% block auth_content %}
{% if token_fail %}
    <div class="alert alert-danger">This reset link is invalid or has expired.</div>
    <a href="{% url 'account_reset_password' %}" class="btn btn-warning">Request New Link</a>
{% else %}
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <div class="d-grid mt-3">
        <button class="btn btn-success btn-lg" type="submit">Set Password</button>
    </div>
</form>
{% endif %}
{% endblock %}
