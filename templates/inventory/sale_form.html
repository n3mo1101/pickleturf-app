{% extends 'layouts/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Record Sale – {{ item.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">
                    <i class="bi bi-cart-plus"></i> Record Sale – {{ item.name }}
                </h5>
            </div>
            <div class="card-body">
                <div class="alert alert-secondary">
                    Sale price: <strong>₱{{ item.sale_price }}</strong> |
                    Stock: <strong>{{ item.stock }}</strong>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i> Record Sale
                        </button>
                        <a href="{% url 'inventory:admin_detail' item.pk %}"
                           class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
