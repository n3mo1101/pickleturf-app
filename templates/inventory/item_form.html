{% extends 'layouts/base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-7">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">
                    <i class="bi bi-box-seam"></i> {{ title }}
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i>
                            {% if item %}Save Changes{% else %}Add Item{% endif %}
                        </button>
                        <a href="{% url 'inventory:admin_list' %}"
                           class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // Show/hide price fields based on item type
    const typeSelect   = document.getElementById('id_item_type');
    const salePriceRow = document.getElementById('id_sale_price')?.closest('.mb-3');
    const rentPriceRow = document.getElementById('id_rent_price')?.closest('.mb-3');

    function togglePriceFields() {
        const val = typeSelect?.value;
        if (!val) return;
        if (salePriceRow) salePriceRow.style.display =
            (val === 'rent') ? 'none' : '';
        if (rentPriceRow) rentPriceRow.style.display =
            (val === 'sale') ? 'none' : '';
    }

    typeSelect?.addEventListener('change', togglePriceFields);
    togglePriceFields();
</script>
{% endblock %}
