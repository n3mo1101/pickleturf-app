{% extends 'layouts/base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">
                    <i class="bi bi-megaphone"></i> {{ title }}
                </h5>
            </div>
            <div class="card-body p-4">

                {# Live preview #}
                <div id="preview-box" class="alert alert-info mb-3"
                     style="display:none;">
                    <strong id="preview-title"></strong>
                    <span id="preview-body"></span>
                </div>

                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle"></i>
                            {% if announcement %}
                                Save Changes
                            {% else %}
                                Publish Announcement
                            {% endif %}
                        </button>
                        <a href="{% url 'announcements:admin_list' %}"
                           class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const titleInput = document.getElementById('id_title');
    const bodyInput  = document.getElementById('id_body');
    const levelInput = document.getElementById('id_level');
    const previewBox   = document.getElementById('preview-box');
    const previewTitle = document.getElementById('preview-title');
    const previewBody  = document.getElementById('preview-body');

    function updatePreview() {
        const t = titleInput.value.trim();
        const b = bodyInput.value.trim();
        const l = levelInput.value;

        if (t) {
            previewBox.style.display = '';
            // Update alert class
            previewBox.className = `alert alert-${l} mb-3`;
            previewTitle.textContent = t;
            previewBody.textContent  = b ? ` — ${b}` : '';
        } else {
            previewBox.style.display = 'none';
        }
    }

    titleInput?.addEventListener('input', updatePreview);
    bodyInput?.addEventListener('input', updatePreview);
    levelInput?.addEventListener('change', updatePreview);

    // Trigger on page load for edit form
    updatePreview();
</script>
{% endblock %}
